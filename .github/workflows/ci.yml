name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------- Rust ----
  rust:
    name: Rust (fmt · clippy · test · deny · machete)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain (+ rustfmt, clippy)
        run: |
          rustup show active-toolchain || rustup toolchain install stable
          rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace
      - name: cargo-deny
        run: |
          cargo install cargo-deny --locked
          cargo deny check
      - name: cargo-machete (unused deps)
        run: |
          cargo install cargo-machete --locked
          cargo machete

  # ------------------------------------------------------- Shell & Python ----
  shell-python:
    name: Shell (shellcheck · shfmt) · Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          curl -sS https://webi.sh/shfmt | sh || (cd /tmp && curl -sSL -o shfmt https://github.com/mvdan/sh/releases/latest/download/shfmt_v3.13.1_linux_amd64 && chmod +x shfmt && sudo mv shfmt /usr/local/bin/)
          pipx install ruff || pip install ruff
      - name: ShellCheck
        run: shellcheck $(git ls-files '*.sh' | grep -v '^ThirdParty/')
      - name: shfmt (diff)
        run: shfmt -i 2 -ci -sr -d $(git ls-files '*.sh' | grep -v '^ThirdParty/')
      - name: Ruff lint + format check
        run: |
          ruff check $(git ls-files '*.py')
          ruff format --check $(git ls-files '*.py')

  # ------------------------------------------------- Swift format & lint ----
  # Runs on any macOS image — SwiftFormat/SwiftLint do NOT need to compile the
  # package, so this gate is independent of the Xcode 26.5 toolchain requirement.
  swift-lint:
    name: Swift (SwiftFormat · SwiftLint --strict)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: brew install swiftlint swiftformat
      - run: swiftformat Sources Tests Apps --lint
      - run: swiftlint --strict --quiet

  # ----------------------------------------------- Swift build & test -------
  # NOTE: the package targets macOS 26 / iOS 26 (.v26), which needs Xcode 26.5+.
  # Until GitHub's hosted images ship it, run this on a self-hosted runner or
  # locally via `make check`. Kept here so it activates automatically once the
  # hosted image updates.
  swift-build-test:
    name: Swift build + test (needs Xcode 26.5+)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select newest Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.5.app || echo "Xcode 26.5 not on this image — see note above"
      - name: Build Rust FFI staticlib
        run: cargo build --release -p aislopdesk-ffi
        working-directory: rust
      - run: swift build
      - run: swift test
