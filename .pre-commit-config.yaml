# Git hooks, run by prek (https://github.com/j178/prek) — a fast, drop-in pre-commit
# runner. Also works with classic `pre-commit`.
#
# SPEED DESIGN (fastest commit + highest cache hit):
#   • Two stages: format + lint run on `pre-commit` (cheap, file-scoped); the slow
#     unit tests run on `pre-push` (once per push, not per commit).
#   • Every language hook is `language: system` → NO hook environment to provision,
#     so there's nothing to build/cache-miss; it just shells out to the already-
#     installed tool (same ones `make lint`/`make test` use).
#   • Each hook is gated by a tight `files:` regex, so a commit touching only .py
#     (say) runs ONLY the Python hooks — prek skips every other hook entirely.
#   • prek runs independent hooks in PARALLEL and starts ~instantly (Rust, no venv).
#
# Install (idempotent):   prek install      # installs BOTH pre-commit + pre-push hooks
# Run manually:           prek run --all-files
#                         prek run --all-files --hook-stage pre-push
# Skip once:              git commit --no-verify   /   git push --no-verify

minimum_pre_commit_version: "3.5.0"
default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]
fail_fast: false

repos:
  # Generic hygiene (prek runs these natively — no Python env needed). Pinned to
  # pre-commit so the file-modifying ones never fire at push time.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # `slopdesk_ffi.h` is GENERATED by cbindgen (Rust = SoT) and gated by `check-ffi-header`;
      # keep the file-modifying hygiene hooks off it so they can never rewrite the generated bytes
      # out from under the drift-gate (cmp vs cbindgen output).
      - id: trailing-whitespace
        stages: [pre-commit]
        exclude: '\.md$|^ThirdParty/|slopdesk_ffi\.h$'
      - id: end-of-file-fixer
        stages: [pre-commit]
        exclude: '^ThirdParty/|slopdesk_ffi\.h$'
      - id: check-yaml
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
        args: [--maxkb=2048]
      - id: mixed-line-ending
        stages: [pre-commit]
        args: [--fix=lf]
        exclude: 'slopdesk_ffi\.h$'

  - repo: local
    hooks:
      # ============================ FORMAT (apply) ============================
      # These WRITE formatting fixes. If a file changes, the commit aborts so you
      # re-stage the formatted result (standard format-hook flow).
      - id: swiftformat
        name: swiftformat (apply)
        entry: swiftformat
        language: system
        # product trees + the package manifest — matches `make fmt-swift`. The standalone
        # probe/spike .swift scripts under scripts/ & docs/ stay out of scope.
        files: '^(Package\.swift|(Sources|Tests|Apps)/.*\.swift)$'

      - id: rustfmt
        name: rustfmt (apply)
        entry: bash -c 'cd rust && cargo fmt --all'
        language: system
        files: '^rust/.*\.rs$'
        pass_filenames: false

      - id: shfmt
        name: shfmt (apply)
        entry: shfmt -i 2 -ci -sr -w
        language: system
        files: '\.sh$'
        exclude: '^ThirdParty/'

      - id: ruff-format
        name: ruff format (apply)
        entry: ruff format
        language: system
        files: '\.py$'

      # ============================== LINT (check) ===========================
      - id: swiftlint
        name: swiftlint --strict
        entry: swiftlint lint --strict --quiet
        language: system
        # product trees only — matches the .swiftlint.yml `included:` (Sources/Tests/Apps).
        files: '^(Sources|Tests|Apps)/.*\.swift$'

      - id: clippy
        name: cargo clippy -D warnings
        entry: bash -c 'cd rust && cargo clippy --workspace --all-targets -- -D warnings'
        language: system
        files: '^rust/.*\.rs$'
        pass_filenames: false

      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        files: '\.sh$'
        exclude: '^ThirdParty/'

      - id: ruff-check
        name: ruff check
        entry: ruff check --force-exclude
        language: system
        files: '\.py$'

      # ===================== UNIT TESTS (pre-push only) ======================
      # Slow → kept off the per-commit path. The script adds two speedups on top of the
      # incremental build cache: a GREEN-TREE CACHE (a push of a HEAD^{tree} already tested
      # green — by `make test`/`make check` or a previous push — skips the run entirely) and
      # `--parallel` (per-class xctest workers, ~92s → ~60s; safe since `SettingsKey.store`
      # isolates each worker's UserDefaults).
      - id: swift-test
        name: swift test (green-tree cache + --parallel; scripts/pre-push-test.sh)
        entry: bash scripts/pre-push-test.sh
        language: system
        files: '^(Sources|Tests|Apps)/.*\.swift$'
        pass_filenames: false
        stages: [pre-push]
