# Renderer-DISABLED iOS spec for the real-device GUI-video test (PATH 2 / ô ④).
# Drops the libghostty renderer (the 566MB xcframework is not needed to verify video decode/
# render) and keeps only SlopDeskClientUI + SlopDeskVideoClient. AppMain gates the renderer on
# `#if canImport(CGhostty)`, so without CGhostty the terminal shows the placeholder while the
# Remote-window video sheet (SlopDeskVideoClient) works fully — which is all this test needs.
name: ClientApp-iOS
options:
  bundleIdPrefix: com.slopdesk
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

packages:
  SlopDesk:
    path: ../..

targets:
  ClientApp-iOS:
    type: application
    platform: iOS
    sources:
      - path: ../Shared
    dependencies:
      # The rebuilt SwiftUI scene (L2): AppMain launches `SlopDeskClientApp` from this product, which
      # transitively pulls in SlopDeskWorkspaceCore (logic + seam types) + SlopDeskDesignSystem (tokens).
      - package: SlopDesk
        product: SlopDeskClientUI
      - package: SlopDesk
        product: SlopDeskVideoClient
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.slopdesk.client.ios
        PRODUCT_NAME: SlopDesk
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        ARCHS: arm64
        ONLY_ACTIVE_ARCH: "NO"
