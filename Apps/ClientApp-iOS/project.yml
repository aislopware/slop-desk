# XcodeGen spec for the Aislopdesk iOS client app.
#
# This project.yml is the SOURCE OF TRUTH; the generated `.xcodeproj` is gitignored
# (regenerate with: `xcodegen generate --spec Apps/ClientApp-iOS/project.yml`).
#
# The app target depends on the LOCAL SwiftPM package product `AislopdeskClientUI`, which carries
# the iOS UIKit native-feel table-stakes (KeyRepeater / IMEProxyTextView /
# FloatingCursorController / KeyboardAccessoryBar — doc 17 §2.5). The `@main` entry is
# `Apps/Shared/AppMain.swift` → `AislopdeskClientApp`.
#
# The libghostty `GhosttyTerminalView` is added once the xcframework exists; until then the
# BUILD-STATUS placeholder renders (libghostty-only policy, no fallback VT engine).
name: ClientApp-iOS
options:
  bundleIdPrefix: com.aislopdesk
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

packages:
  Aislopdesk:
    path: ../..

targets:
  ClientApp-iOS:
    type: application
    platform: iOS
    sources:
      - path: ../Shared
      # PATH 1 (libghostty renderer): the gated renderer host + binding (GhosttySurface.swift
      # + GhosttyTerminalView.swift). NOT members of any Package.swift target — they join THIS
      # app target so `import CGhostty` resolves and `#if canImport(CGhostty)` flips true.
      - path: ../../ThirdParty/ghostty/integration/GhosttySurface
    dependencies:
      - package: Aislopdesk
        product: AislopdeskClientUI
      # PATH 2 (GUI video path): links the client decode/render/cursor pipeline so
      # AppMain can register VideoWindowFactory.shared with the real VideoWindowView.
      # Carries VideoToolbox/Metal — never instantiated in tests, only at GUI launch.
      - package: Aislopdesk
        product: AislopdeskVideoClient
      # PATH 1 (libghostty renderer): the libghostty static binary (link-time `ghostty`
      # C-ABI symbols) as an xcframework. The UNIVERSAL build ships ios-arm64 (device) +
      # ios-arm64-simulator slices, both built on this host against the iOS 26.5 SDK; the
      # xcframework auto-selects the right slice per destination.
      - framework: ../../ThirdParty/ghostty/libghostty.xcframework
        embed: true
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
    # iOS apps are not App-Sandboxed via entitlement keys and have network access by
    # default; the byte pipeline pauses on background + resumes byte-exact on foreground
    # (AislopdeskClient.pause()/resume()), so no persistent background mode is declared. No
    # custom entitlements needed for the standard client.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aislopdesk.client.ios
        PRODUCT_NAME: Aislopdesk
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        # PATH 1 (libghostty renderer): point the Swift importer at the CGhostty clang
        # module map (module.modulemap + vendored ghostty.h) so `import CGhostty` resolves
        # and `#if canImport(CGhostty)` flips true → GhosttyTerminalView/GhosttySurface
        # compile into this target and link against libghostty.xcframework.
        SWIFT_INCLUDE_PATHS: $(SRCROOT)/../../ThirdParty/ghostty/integration/CGhostty
        # The xcframework ships ios-arm64 (device) + ios-arm64-simulator — both arm64
        # only (Apple-silicon target). Pin ARCHS=arm64 so a generic 'iOS Simulator'
        # destination does NOT also demand an x86_64 slice (which would fail to link).
        ARCHS: arm64
        ONLY_ACTIVE_ARCH: "NO"
        # libghostty vendors C/C++ deps (Dear ImGui, spirv-cross, glslang, FreeType,
        # sentry, oniguruma, …) referencing the C++ runtime + a few iOS system frameworks
        # (CoreText/CoreGraphics for fonts, QuartzCore/Metal for the layer). NO Carbon —
        # it is macOS-only; the iOS slice does not reference it.
        OTHER_LDFLAGS:
          - -lc++
          - -framework
          - CoreText
          - -framework
          - CoreGraphics
          - -framework
          - QuartzCore
          - -framework
          - Metal
        # Best-effort builds run unsigned for an iOS Simulator destination:
        #   xcodebuild build -destination 'generic/platform=iOS Simulator' \
        #     CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
