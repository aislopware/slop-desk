# XcodeGen spec for the Rwork macOS client app.
#
# This project.yml is the SOURCE OF TRUTH; the generated `.xcodeproj` is gitignored
# (regenerate with: `xcodegen generate --spec Apps/ClientApp-macOS/project.yml`).
#
# The app target depends on the LOCAL SwiftPM package product `RworkClientUI` (which
# transitively pulls RworkClient/RworkInspector/RworkClaudeCode/RworkTerminal). The `@main`
# entry is `Apps/Shared/AppMain.swift` → `RworkClientApp` (in the library).
#
# The libghostty `GhosttyTerminalView` (Metal + GhosttySurface) is added once the
# xcframework exists (see Apps/Shared/AppMain.swift wiring notes + ThirdParty/ghostty/README);
# until then the BUILD-STATUS placeholder renders (libghostty-only policy, no fallback).
name: ClientApp-macOS
options:
  bundleIdPrefix: com.rwork
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

packages:
  Rwork:
    # The local SwiftPM package at the repo root (two levels up from this spec).
    path: ../..

targets:
  ClientApp-macOS:
    type: application
    platform: macOS
    sources:
      - path: ../Shared
      # PATH 1 (libghostty renderer): the gated renderer host + binding. This directory
      # carries BOTH GhosttySurface.swift (the @MainActor TerminalSurface binding over the
      # CGhostty C ABI) and GhosttyTerminalView.swift (the TerminalRenderingView conformer).
      # They are NOT members of any Package.swift target — they join THIS app target so
      # `import CGhostty` resolves and `#if canImport(CGhostty)` flips true.
      - path: ../../ThirdParty/ghostty/integration/GhosttySurface
    dependencies:
      - package: Rwork
        product: RworkClientUI
      # PATH 2 (GUI video path): links the client decode/render/cursor pipeline so
      # AppMain can register VideoWindowFactory.shared with the real VideoWindowView.
      # Carries VideoToolbox/Metal — never instantiated in tests, only at GUI launch.
      - package: Rwork
        product: RworkVideoClient
      # PATH 1 (libghostty renderer): the libghostty static binary (the link-time
      # `ghostty` C-ABI symbols) packaged as an xcframework, built ON this macOS-26.5 host
      # by ThirdParty/ghostty/build-libghostty.sh. The universal build also ships iOS
      # slices (see scripts/enable-ios-renderer.sh); this macOS target links the macOS slice.
      - framework: ../../ThirdParty/ghostty/libghostty.xcframework
        embed: true
    info:
      path: Info.plist
      properties:
        LSMinimumSystemVersion: "26.0"
        NSHighResolutionCapable: true
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
    entitlements:
      path: ClientApp-macOS.entitlements
      properties:
        # The macOS CLIENT is a viewer: connects out over (NetBird) network + renders bytes.
        # No Accessibility / CGEvent / screen-capture (those are PATH 2 HOST concerns, doc 06)
        # → sandboxed with only an outbound network-client entitlement.
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rwork.client.macos
        PRODUCT_NAME: Rwork
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        # PATH 1 (libghostty renderer): point the Swift importer at the CGhostty clang
        # module map (module.modulemap + vendored ghostty.h) so `import CGhostty` resolves
        # and `#if canImport(CGhostty)` flips true → GhosttyTerminalView/GhosttySurface
        # compile into this target and link against libghostty.xcframework.
        SWIFT_INCLUDE_PATHS: $(SRCROOT)/../../ThirdParty/ghostty/integration/CGhostty
        # libghostty.xcframework currently ships ONLY a macos-arm64 slice (built on this
        # macOS-26.5 arm64 host; the x86_64/universal slice needs a separate build). Pin
        # the macOS app to arm64 so the link resolves against that slice. (Apple-silicon
        # is the target; Intel macOS is EOL for this project.)
        ARCHS: arm64
        ONLY_ACTIVE_ARCH: "NO"
        # libghostty vendors C/C++ dependencies (Dear ImGui, spirv-cross, glslang,
        # FreeType, sentry, oniguruma, …). The static lib references the C++ runtime and
        # a handful of system frameworks (Carbon for TIS keyboard-layout APIs, CoreText/
        # CoreGraphics for font rendering). Link them so the libghostty symbols resolve.
        OTHER_LDFLAGS:
          - -lc++
          - -framework
          - Carbon
          - -framework
          - CoreText
          - -framework
          - CoreGraphics
          - -framework
          - QuartzCore
          - -framework
          - Metal
        # Best-effort builds in CI / this environment run unsigned:
        #   xcodebuild build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
