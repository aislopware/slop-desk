# XcodeGen spec for the SlopDesk macOS HOST menu-bar app (issue #5, research §C / C1).
#
# This project.yml is the SOURCE OF TRUTH; the generated `.xcodeproj` is gitignored
# (regenerate with: `xcodegen generate --spec Apps/HostApp-macOS/project.yml`).
#
# A friendly menu-bar (MenuBarExtra) front-end over the EXISTING headless host daemons.
# It runs the SAME terminal `HostServer` the `slopdesk-hostd` CLI runs, but IN-PROCESS on a
# background task with a Start/Stop toggle — no terminal / CLI knowledge required. The doc
# frames this as a thin auth + observability shell (RustDesk CM-over-IPC model): the C1
# TCC permission checklist (Screen Recording + Accessibility) lives here too, ready for the
# later GUI-video host wiring.
#
# This spec MIRRORS Apps/ClientApp-macOS/project.yml, minus everything the host does not
# need: no libghostty xcframework / CGhostty module / Metal-Carbon OTHER_LDFLAGS, no
# SlopDeskVideoClient. The host app links ONLY the `SlopDeskHost` package product (in-process
# terminal server). Fully ADDITIVE — ClientApp-macOS is untouched.
name: HostApp-macOS
options:
  bundleIdPrefix: com.slopdesk
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

packages:
  SlopDesk:
    # The local SwiftPM package at the repo root (two levels up from this spec).
    path: ../..

targets:
  HostApp-macOS:
    type: application
    platform: macOS
    sources:
      # The Swift files in THIS directory only (NOT Apps/Shared — that carries the client's
      # own `@main struct ClientAppMain`; the host app has its own `@main` here).
      - path: .
    dependencies:
      # The ONLY package product the host app needs: the in-process terminal server
      # (HostServer + PTY relay + transport). No video, no libghostty.
      - package: SlopDesk
        product: SlopDeskHost
    info:
      path: Info.plist
      properties:
        LSMinimumSystemVersion: "26.0"
        # Agent / menu-bar app: no Dock icon, no default window — the UI is the status item.
        LSUIElement: true
        NSHighResolutionCapable: true
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
    entitlements:
      path: HostApp-macOS.entitlements
      properties:
        # The host LISTENS for inbound mux connections → network.server (the client app is
        # network.client). NOT sandboxed: the host forks the user's login shell (PTY
        # fork/exec) and will later need Screen Recording / Accessibility (TCC) for the
        # GUI-video + remote-input features — App Sandbox would block both. Mirror
        # slopdesk-hostd, which runs unsandboxed.
        com.apple.security.network.server: true
    settings:
      base:
        # PIN the bundle ID: TCC grants are keyed by bundle ID (research §C1 gotcha) — a
        # drifting ID silently loses the Screen-Recording / Accessibility grants.
        PRODUCT_BUNDLE_IDENTIFIER: com.slopdesk.host.macos
        PRODUCT_NAME: SlopDeskHost
        # The app target links the SwiftPM library MODULE named `SlopDeskHost`. Xcode derives a
        # target's Swift module name from PRODUCT_NAME by default, which would make the APP
        # module also `SlopDeskHost` and collide with the library (xcodebuild: "Multiple commands
        # produce SlopDeskHost.swiftmodule"). Pin a DISTINCT module name so the bundle stays
        # SlopDeskHost.app while the app code compiles as module `SlopDeskHostApp`.
        PRODUCT_MODULE_NAME: SlopDeskHostApp
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        ARCHS: arm64
        ONLY_ACTIVE_ARCH: "NO"
        # Best-effort builds in CI / this environment run unsigned:
        #   xcodebuild build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
