# cbindgen config for the aislopdesk-ffi C ABI.
#
# The C header `include/aislopdesk_ffi.h` is GENERATED from the Rust `#[repr(C)]` / `extern "C"`
# surface in `src/` — Rust is the single source of truth. `rust/build-apple.sh` regenerates it and
# a CI drift-gate (`make check` + the `rust` CI job) fails on any diff, so the header can never be
# hand-edited out of sync. Do NOT edit the .h by hand; edit the Rust and regenerate.
#
# Settings below are load-bearing for THIS surface (proven against tests/smoke.c under -Werror):
#   * style = "both"        — emit `typedef struct Foo Foo;` AND `struct Foo {...}`. smoke.c (and the
#                             Swift importer) refer to bare typedef names, so plain `tag` breaks them.
#   * usize_is_size_t       — `usize` -> `size_t` (not `uintptr_t`), matching the hand-written header.
#   * documentation + "c"   — carry the per-field/per-item `///` docs into the header as `/* */`.
# Keep per-field rationale as Rust `///` docs (it round-trips); free-standing prose lives in `header`.

language = "C"
style = "both"
usize_is_size_t = true
cpp_compat = true
include_guard = "AISLOPDESK_FFI_H"
tab_width = 4
documentation = true
documentation_style = "c"
documentation_length = "full"
line_length = 100

# The curated memory-contract banner. cbindgen does NOT promote the Rust `//!` module docs to a
# file banner, so the prose that is not attached to a single item lives here and is emitted verbatim
# at the top of every generation.
header = """
/*
 * aislopdesk_ffi.h — the C ABI of `aislopdesk-ffi`.
 *
 * GENERATED by cbindgen from the Rust `#[repr(C)]` / `extern "C"` surface in `src/`.
 * DO NOT EDIT BY HAND — regenerate via `rust/build-apple.sh`; a CI drift-gate fails on any diff.
 *
 * This header is the contract a non-Rust platform shell links against to drive the pure
 * `aislopdesk-core` codecs (Swift on Apple via a bridging header; a JNI shim on Android).
 *
 * Memory contract: every `AisdBytes` / `AisdBytesArray` / `AisdWireMessage` this library *returns*
 * owns a Rust allocation and MUST be released with the matching `aisd_*_free` — never C `free()`.
 * Buffers you pass *in* are borrowed for the call only (`cap == 0`) and never freed by Rust.
 * Opaque handles are created by `*_new` and destroyed by `*_free`; use-after-free / double-free is
 * undefined behaviour, exactly as in C. Decoders overwrite `*out` without freeing prior contents.
 *
 * C-struct booleans are `uint8_t` read as `(!= 0)` — never a Rust `bool` (validity-UB for any byte
 * other than 0/1; a JNI `jboolean` / C `int` may carry 2).
 */"""

[export]
# The `AisdBytes::EMPTY` / `AisdBytesArray::EMPTY` associated consts initialise from
# `core::ptr::null_mut()`, which cbindgen can't const-evaluate; they were never part of the C ABI
# (internal Rust conveniences), so they are skipped from the output.
exclude = ["EMPTY"]

# KNOWN-BENIGN cbindgen warnings on a correct run (they do NOT affect the emitted header, which the
# drift-gate verifies by content, and `tests/smoke.c` compiles against under -Werror):
#   * 2x "Skip aislopdesk-ffi::EMPTY (Unsupported path expression core::ptr::null_mut)" — the two
#     internal associated consts above; never on the ABI.
#   * 1x "Can't find u64" — cosmetic type-name resolution for AISD_FRAME_HASH_SENTINEL; the value
#     still renders correctly as `UINT64_MAX`.
